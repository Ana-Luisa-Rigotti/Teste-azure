<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Pessoas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        background: #f5f5f5;
      }

      h1,
      h2 {
        color: #333;
      }

      form {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        margin-bottom: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        background: #0078d4;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #005ea6;
      }

      .card {
        background: white;
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <h1>Cadastro de Pessoas</h1>

    <form action="/pessoas-form" method="post">
      <label for="id">ID</label>
      <input type="number" id="id" name="id" required />

      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required />

      <label for="idade">Idade</label>
      <input type="number" id="idade" name="idade" required />

      <button type="submit">Cadastrar</button>
    </form>

    <h2>Pessoas cadastradas</h2>

    {% for pessoa in pessoas %}
    <div class="card">
      <strong>ID:</strong> {{ pessoa.id }}<br />
      <strong>Nome:</strong> {{ pessoa.nome }}<br />
      <strong>Idade:</strong> {{ pessoa.idade }}
    </div>
    {% endfor %}
  </body>
</html>
